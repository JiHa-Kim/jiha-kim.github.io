<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    // Warm start for Durand-Kerner polynomial solver
    let dk_warm_roots = null;

    // Robust iterative all-roots finder (Durand-Kerner algorithm)
    function solvePolynomial(coeffs) {
        const n = coeffs.length - 1;
        const a = coeffs.map(c => c / coeffs[0]);
        let roots = [];

        if (dk_warm_roots) {
            for (let i = 0; i < n; i++) roots.push({ re: dk_warm_roots[i].re, im: dk_warm_roots[i].im });
        } else {
            for (let i = 0; i < n; i++) {
                const ang = (2 * Math.PI * i) / n + 0.1;
                roots.push({ re: Math.cos(ang), im: Math.sin(ang) });
            }
        }

        const maxIter = dk_warm_roots ? 15 : 100;
        for (let iter = 0; iter < maxIter; iter++) {
            let maxDelta = 0;
            for (let i = 0; i < n; i++) {
                let valRe = 1, valIm = 0;
                for (let j = 1; j <= n; j++) {
                    let nextRe = valRe * roots[i].re - valIm * roots[i].im + a[j];
                    let nextIm = valRe * roots[i].im + valIm * roots[i].re;
                    valRe = nextRe; valIm = nextIm;
                }
                let denomRe = 1, denomIm = 0;
                for (let j = 0; j < n; j++) {
                    if (i === j) continue;
                    let dx = roots[i].re - roots[j].re;
                    let dy = roots[i].im - roots[j].im;
                    let nextRe = denomRe * dx - denomIm * dy;
                    let nextIm = denomRe * dy + denomIm * dx;
                    denomRe = nextRe; denomIm = nextIm;
                }
                const dMag2 = denomRe * denomRe + denomIm * denomIm || 1e-20;
                const deltaRe = (valRe * denomRe + valIm * denomIm) / dMag2;
                const deltaIm = (valIm * denomRe - valRe * denomIm) / dMag2;
                roots[i].re -= deltaRe;
                roots[i].im -= deltaIm;
                maxDelta = Math.max(maxDelta, Math.abs(deltaRe) + Math.abs(deltaIm));
            }
            if (maxDelta < 1e-12) break;
        }
        dk_warm_roots = roots;
        return roots;
    }

    // Math Core
    function dwh_coeffs(ell) {
        let gamma_inner = Math.pow(4 * (1 - ell * ell) / Math.pow(ell, 4), 1.0 / 3.0);
        let r = Math.sqrt(1 + gamma_inner);
        let innerSqrt = 8 - 4 * gamma_inner + 8 * (2 - ell * ell) / (ell * ell * r);
        let a = r + 0.5 * Math.sqrt(Math.max(0, innerSqrt));
        let b = Math.pow(a - 1, 2) / 4;
        let c = a + b - 1;
        
        let alpha = b / c;
        let beta = (a - alpha) / c;
        let gamma = 1 / c;
        return { alpha, beta, gamma };
    }

    function dwh_map(x, coeffs) {
        return x * (coeffs.alpha + coeffs.beta / (coeffs.gamma + x * x));
    }

    function centered_pe_coeffs(lambda) {
        if (lambda >= 0.999999) return { a: 1, b: 0, c: 0, upper: 1, lower: 1 };
        const L2 = lambda * lambda, L4 = L2 * L2, L6 = L4 * L2;
        const poly_coeffs = [
            -2048,                      // q^9
            -5888,                      // q^8
            -9608 + 4520 * L2,          // q^7
            -7728 + 9340 * L2,          // q^6
            -1288 + 10990 * L2 - 3600 * L4, // q^5
            1748 + 8525 * L2 - 5800 * L4,   // q^4
            888 + 3200 * L2 - 3900 * L4 + 1000 * L6, // q^3
            8 + 80 * L2 - 1750 * L4 + 1500 * L6,      // q^2
            -72 - 240 * L2 - 600 * L4 + 750 * L6,     // q
            -12 - 40 * L2 - 100 * L4 + 125 * L6       // 1
        ];

        const r_list = solvePolynomial(poly_coeffs);
        const candidates = r_list
            .filter(r => Math.abs(r.im) < 1e-8)
            .map(r => r.re)
            .filter(q0 => q0 > lambda && q0 < 0.999)
            .sort((a, b) => a - b);

        let best = null;
        for (const q0 of candidates) {
            const q0_2 = q0 * q0;
            const r2 = (2 * q0 * q0_2 + 4 * q0_2 + 6 * q0 + 3) / (5 * (2 * q0 + 1));
            const r = Math.sqrt(r2);
            if (r2 <= 0 || !(q0 < r && r < 1)) continue;
            
            const S = q0_2 + r2, P = q0_2 * r2;
            const D = (1 - 5 / 3 * S + 5 * P) + lambda * (L4 - 5 / 3 * S * L2 + 5 * P);
            if (Math.abs(D) < 1e-12) continue;
            
            const c = 2 / D;
            const b = -5 * c / 3 * S;
            const a = 5 * c * P;
            const p = (x) => { const x2 = x*x; return x * (a + x2 * (b + x2 * c)); };

            const lower = p(lambda);
            const upper = p(1);
            const errs = [1 - lower, 1 - p(r), p(q0) - 1, upper - 1];
            const spread = Math.max(...errs) - Math.min(...errs);
            if (errs.every(e => e > -1e-8) && spread < 1e-5) {
                const candidate = { a, b, c, upper, lower, spread };
                if (!best || candidate.spread < best.spread) best = candidate;
            }
        }
        if (best) return best;
        const fallbackUpper = 1.0;
        const fallbackLower = lambda * (1.875 + L2 * (-1.25 + 0.375 * L2));
        return { a: 1.875, b: -1.25, c: 0.375, upper: fallbackUpper, lower: fallbackLower, spread: Infinity };
    }

    function centered_pe_map(x, upperIn, coeffs) {
        const y = x / upperIn;
        const y2 = y * y;
        return y * (coeffs.a + y2 * (coeffs.b + y2 * coeffs.c));
    }


    // Colors for multiple methods
    const methodColors = [
        { border: '#8e24aa', rgb: '142, 36, 170' },
        { border: '#00acc1', rgb: '0, 172, 193' },
        { border: '#fb8c00', rgb: '251, 140, 0' },
        { border: '#43a047', rgb: '67, 160, 71' },
        { border: '#e53935', rgb: '229, 57, 53' }
    ];
    
    let methods = [
        { dwh: 1, pe: 2, opacity: 1.0, maxErr: 0 }
    ];

    // UI Elements
    const ellInput = document.getElementById('ellInput');
    const logXAxis = document.getElementById('logXAxis');
    const logErrorAxis = document.getElementById('logErrorAxis');
    const methodsContainer = document.getElementById('methodsContainer');
    const addMethodBtn = document.getElementById('addMethodBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const polarWidget = document.getElementById('polarWidget');

    if (fullscreenBtn && polarWidget) {
        fullscreenBtn.addEventListener('click', () => {
            polarWidget.classList.toggle('fullscreen');
            const isFullscreen = polarWidget.classList.contains('fullscreen');
            
            if (isFullscreen) {
                fullscreenBtn.innerHTML = '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14h6v6M20 10h-6V4M14 10l7-7M3 21l7-7"/></svg>';
                document.body.style.overflow = 'hidden';
            } else {
                fullscreenBtn.innerHTML = '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>';
                document.body.style.overflow = '';
            }
            
            setTimeout(() => {
                chart.resize();
            }, 50);
        });
    }
    
    function renderMethodsUI() {
        methodsContainer.innerHTML = '';
        const isDark = document.documentElement.getAttribute("data-mode") === "dark";
        
        methods.forEach((m, idx) => {
            let colorObj = methodColors[idx % methodColors.length];
            let div = document.createElement('div');
            div.className = 'pw-method-card';
            div.style.borderLeft = `4px solid ${colorObj.border}`;
            div.style.setProperty('--m-color', colorObj.border);
            
            div.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px;">
                    <div style="font-weight: bold; font-size: 0.95em; color: var(--heading-color, inherit);">Method ${idx + 1}</div>
                    ${methods.length > 1 ? `<button class="remove-btn pw-icon-btn" data-idx="${idx}" style="color: #e53935; padding: 2px; margin-top: -4px;">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>` : ''}
                </div>
                
                <div class="pw-metric-row">
                    <span class="pw-metric-label">Max Error</span>
                    <span class="pw-metric-value">${m.maxErr > 0 ? m.maxErr.toExponential(2) : '-'}</span>
                </div>

                <div style="display: flex; gap: 15px; margin: 15px 0 12px 0;">
                    <div class="pw-control-group">
                        <label style="font-size: 0.75em;">DWH Steps</label>
                        <input type="number" class="m-dwh" data-idx="${idx}" min="0" max="6" step="1" value="${m.dwh}" style="width: 50px; padding: 4px; font-size: 0.85em;" />
                    </div>
                    <div class="pw-control-group">
                        <label style="font-size: 0.75em;">PE Steps</label>
                        <input type="number" class="m-pe" data-idx="${idx}" min="0" max="6" step="1" value="${m.pe}" style="width: 50px; padding: 4px; font-size: 0.85em;" />
                    </div>
                </div>
                <div class="pw-control-group">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label style="font-size: 0.75em;">Opacity</label>
                        <span style="font-size: 0.7em; opacity: 0.6;">${Math.round(m.opacity * 100)}%</span>
                    </div>
                    <input type="range" class="m-opacity pw-slider" data-idx="${idx}" min="0" max="1" step="0.05" value="${m.opacity}" />
                </div>
            `;
            methodsContainer.appendChild(div);
        });

        document.querySelectorAll('.m-dwh').forEach(el => el.addEventListener('change', (e) => {
            methods[e.target.dataset.idx].dwh = parseInt(e.target.value);
            generateData();
        }));
        document.querySelectorAll('.m-pe').forEach(el => el.addEventListener('change', (e) => {
            methods[e.target.dataset.idx].pe = parseInt(e.target.value);
            generateData();
        }));
        document.querySelectorAll('.m-opacity').forEach(el => el.addEventListener('input', (e) => {
            const idx = e.target.dataset.idx;
            const m = methods[idx];
            m.opacity = parseFloat(e.target.value);
            e.target.previousElementSibling.querySelector('span').textContent = Math.round(m.opacity * 100) + '%';
            
            // Fast visual-only update: dataset index is idx + 1 (0 is Floor Line)
            const dsIdx = parseInt(idx) + 1;
            if (chart.data.datasets[dsIdx]) {
                const cObj = methodColors[idx % methodColors.length];
                chart.data.datasets[dsIdx].borderColor = `rgba(${cObj.rgb}, ${m.opacity})`;
                chart.data.datasets[dsIdx].backgroundColor = `rgba(${cObj.rgb}, ${m.opacity * 0.1})`;
                chart.update('none');
            }
        }));
        document.querySelectorAll('.remove-btn').forEach(el => el.addEventListener('click', (e) => {
            methods.splice(e.target.dataset.idx, 1);
            renderMethodsUI();
            generateData();
        }));
    }

    addMethodBtn.addEventListener('click', () => {
        if (methods.length < 5) {
            methods.push({ dwh: 0, pe: 0, opacity: 0.8, maxErr: 0 });
            renderMethodsUI();
            generateData();
        }
    });

    ellInput.addEventListener('change', generateData);
    logXAxis.addEventListener('change', generateData);
    logErrorAxis.addEventListener('change', generateData);

    function getThemeColors() {
        const style = getComputedStyle(document.documentElement);
        const isDark = document.documentElement.getAttribute("data-mode") === "dark";
        
        // Use the site's text color variable, with forced contrast fallbacks
        let textColor = style.getPropertyValue('--text-color').trim();
        if (!textColor) {
            textColor = isDark ? "#f0f0f0" : "#222";
        }

        return {
            grid: isDark ? "rgba(255,255,255,0.1)" : "rgba(0,0,0,0.1)",
            ticks: textColor,
            text: textColor
        };
    }

    const theme = getThemeColors();
    Chart.Tooltip.positioners.cursor = function(elements, eventPosition) {
        if (!eventPosition) {
            return false;
        }
        return {
            x: eventPosition.x,
            y: eventPosition.y
        };
    };

    const ctx = document.getElementById('polarPatternChart').getContext('2d');
    let chart = new Chart(ctx, {
        type: 'line',
        data: { datasets: [] },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: { duration: 200 },
            interaction: { mode: 'index', intersect: false },
            plugins: {
                legend: {
                    position: 'top',
                    labels: { color: theme.text }
                },
                tooltip: {
                    position: 'cursor',
                    callbacks: {                        title: (ctx) => `x = ${Number(ctx[0].parsed.x).toPrecision(4)}`,
                        label: (ctx) => `${ctx.dataset.label}: ${Number(ctx.parsed.y).toPrecision(5)}`
                    }
                }
            },
            scales: {
                x: {
                    type: 'linear',
                    title: { display: true, text: 'Input Singular Value x', color: theme.ticks },
                    min: 0, max: 1.1,
                    grid: { color: theme.grid },
                    ticks: { color: theme.ticks }
                },
                y: {
                    type: 'linear',
                    title: { display: true, text: 'Mapped Value f(x)', color: theme.ticks },
                    min: -0.1, max: 1.35,
                    grid: { color: theme.grid },
                    ticks: { color: theme.ticks }
                }
            }
        }
    });

    function generateData() {
        let ell0 = parseFloat(ellInput.value);
        if (isNaN(ell0) || ell0 <= 0) {
            ell0 = 1e-12;
            ellInput.value = ell0;
        }
        const isLogX = logXAxis.checked;
        const isLogError = logErrorAxis.checked;

        chart.options.scales.x.type = isLogX ? 'logarithmic' : 'linear';
        chart.options.scales.x.min = isLogX ? Math.max(ell0 / 2, 1e-6) : 0;
        chart.options.scales.x.max = 1.1;

        chart.options.scales.y.type = isLogError ? 'logarithmic' : 'linear';
        chart.options.scales.y.title.text = isLogError ? 'Absolute Error |1 - f(x)|' : 'Mapped Value f(x)';
        chart.options.scales.y.min = isLogError ? 1e-16 : -0.1;
        chart.options.scales.y.max = isLogError ? 2 : 1.35;

        let xs = [];
        if (isLogX) {
            let start = Math.log10(chart.options.scales.x.min);
            let end = Math.log10(1.0);
            for (let i = 0; i <= 500; i++) {
                xs.push(Math.pow(10, start + i * (end - start) / 500));
            }
        } else {
            for (let i = 0; i <= 1000; i++) {
                xs.push(i / 1000);
            }
        }
        
        if (!xs.includes(1.0)) xs.push(1.0);
        if (!xs.includes(ell0)) xs.push(ell0);
        
        // Add out-of-bounds evaluation to 1.1 explicitly
        for (let i = 1; i <= 20; i++) {
            xs.push(1.0 + i * 0.005);
        }
        xs.sort((a, b) => a - b);

        let datasets = [];

        // Add start floor indicator
        datasets.push({
            label: 'Floor Line',
            data: [{x: ell0, y: isLogError ? 1e-16 : -0.1}, {x: ell0, y: isLogError ? 2 : 1.1}],
            borderColor: '#e91e63',
            borderWidth: 1,
            pointRadius: 0,
            fill: false,
            tension: 0
        });

        methods.forEach((m, mIdx) => {
            let numDWH = m.dwh;
            let numPE = m.pe;
            let current_ell = ell0;
            let current_upper = 1.0;
            
            let dwh_coeffs_cache = [];
            for (let i=0; i<numDWH; i++) {
                let c = dwh_coeffs(current_ell);
                dwh_coeffs_cache.push(c);
                current_ell = dwh_map(current_ell, c);
                current_upper = 1.0;
            }
            
            let pe_coeffs_cache = [];
            for (let i=0; i<numPE; i++) {
                let c = centered_pe_coeffs(current_ell / current_upper);
                pe_coeffs_cache.push({ coeffs: c, upperIn: current_upper });
                current_ell = centered_pe_map(current_ell, current_upper, c);
                current_upper = centered_pe_map(current_upper, current_upper, c);
            }
            
            let maxErrVal = 0;
            let finalData = xs.map(x_init => {
                let evalY = x_init;
                
                for (let i=0; i<numDWH; i++) evalY = dwh_map(evalY, dwh_coeffs_cache[i]);
                for (let i=0; i<numPE; i++) {
                    const step = pe_coeffs_cache[i];
                    evalY = centered_pe_map(evalY, step.upperIn, step.coeffs);
                }
                
                if (x_init >= ell0 && x_init <= 1.0001) {
                    maxErrVal = Math.max(maxErrVal, Math.abs(1 - evalY));
                }
                
                let y = evalY;
                if (isLogError) {
                    y = Math.abs(1 - y);
                    if (y < 1e-16) y = 1e-16;
                }
                
                // Allow plot slightly above and below bounds based on scale
                return {x: x_init, y: isLogError ? Math.min(y, 2) : Math.max(-0.5, Math.min(y, 1.6))};
            });
            
            m.maxErr = maxErrVal;

            let titleStr = '';
            if (numDWH > 0 && numPE > 0) titleStr = `(${numDWH} DWH + ${numPE} PE)`;
            else if (numDWH > 0) titleStr = `(${numDWH} DWH)`;
            else if (numPE > 0) titleStr = `(${numPE} PE)`;
            else titleStr = '(Identity)';
            
            let cObj = methodColors[mIdx % methodColors.length];

            datasets.push({
                label: `Method ${mIdx + 1} ${titleStr}`,
                data: finalData,
                borderColor: `rgba(${cObj.rgb}, ${m.opacity})`,
                backgroundColor: `rgba(${cObj.rgb}, ${m.opacity * 0.1})`,
                borderWidth: 2,
                pointRadius: 0,
                fill: false,
                tension: 0.1
            });
        });

        // Update UI metrics without a full re-render
        document.querySelectorAll('.pw-method-card').forEach((card, idx) => {
            if (methods[idx]) {
                const valEl = card.querySelector('.pw-metric-value');
                if (valEl) valEl.textContent = methods[idx].maxErr.toExponential(2);
            }
        });

        chart.data.datasets = datasets;
        if (!isLogError) {
            let maxY = 1.05;
            for (const ds of datasets) {
                for (const pt of ds.data) {
                    if (Number.isFinite(pt.y)) maxY = Math.max(maxY, pt.y);
                }
            }
            chart.options.scales.y.max = Math.min(2.0, maxY + 0.08);
        }
        chart.update();
    }

    // Theme integration observer
    const observer = new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
            if (mutation.attributeName === "data-mode") {
                const theme = getThemeColors();
                
                chart.options.plugins.legend.labels.color = theme.text;
                chart.options.scales.x.grid.color = theme.grid;
                chart.options.scales.x.ticks.color = theme.ticks;
                chart.options.scales.x.title.color = theme.ticks;
                chart.options.scales.y.grid.color = theme.grid;
                chart.options.scales.y.ticks.color = theme.ticks;
                chart.options.scales.y.title.color = theme.ticks;
                
                renderMethodsUI();
                chart.update();
            }
        });
    });
    observer.observe(document.documentElement, { attributes: true });

    renderMethodsUI();
    generateData();
});
</script>
