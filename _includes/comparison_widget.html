<div class="comparison-widget" id="comparisonWidget">
    <div class="cw-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h4 style="margin: 0;">Convergence Power Comparison</h4>
        <div class="cw-toggles" style="display: flex; gap: 15px; font-size: 0.85em;">
            <label><input type="checkbox" id="cwLogX" checked /> Log X</label>
            <label><input type="checkbox" id="cwLogY" /> Log Error (1-y)</label>
        </div>
    </div>
    <div class="cw-graph-container" style="height: 400px; position: relative; background: var(--main-bg, #fff); border-radius: 12px; padding: 15px; border: 1px solid var(--card-border, rgba(100,100,100,0.15));">
        <canvas id="comparisonChart"></canvas>
    </div>
</div>

<style>
.comparison-widget {
    background: var(--card-bg, rgba(120, 120, 120, 0.05));
    border: 1px solid var(--card-border, rgba(100, 100, 100, 0.15));
    border-radius: 16px;
    padding: 24px;
    margin: 2.5rem 0;
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.08);
}
[data-mode="dark"] .cw-graph-container {
    background: var(--main-bg, #1b1b1e);
}
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    // Warm start for Durand-Kerner polynomial solver
    let dk_warm_roots = null;

    // Robust iterative all-roots finder (Durand-Kerner algorithm)
    // This is a "proper" numerical solver that is extremely stable for deg-9.
    function solvePolynomial(coeffs, initialRoots = null) {
        const n = coeffs.length - 1;
        const a = coeffs.map(c => c / coeffs[0]);
        let roots = [];

        if (initialRoots) {
            for (let i = 0; i < n; i++) roots.push({ re: initialRoots[i].re, im: initialRoots[i].im });
        } else {
            // Initial guesses using unit circle with slight shift
            for (let i = 0; i < n; i++) {
                const ang = (2 * Math.PI * i) / n + 0.1;
                roots.push({ re: Math.cos(ang), im: Math.sin(ang) });
            }
        }

        // Extremely fast convergence with warm starts
        const maxIter = initialRoots ? 10 : 100;
        for (let iter = 0; iter < maxIter; iter++) {
            let maxDelta = 0;
            for (let i = 0; i < n; i++) {
                let valRe = 1, valIm = 0;
                for (let j = 1; j <= n; j++) {
                    let nextRe = valRe * roots[i].re - valIm * roots[i].im + a[j];
                    let nextIm = valRe * roots[i].im + valIm * roots[i].re;
                    valRe = nextRe; valIm = nextIm;
                }
                let denomRe = 1, denomIm = 0;
                for (let j = 0; j < n; j++) {
                    if (i === j) continue;
                    let dx = roots[i].re - roots[j].re;
                    let dy = roots[i].im - roots[j].im;
                    let nextRe = denomRe * dx - denomIm * dy;
                    let nextIm = denomRe * dy + denomIm * dx;
                    denomRe = nextRe; denomIm = nextIm;
                }
                const dMag2 = denomRe * denomRe + denomIm * denomIm || 1e-20;
                const deltaRe = (valRe * denomRe + valIm * denomIm) / dMag2;
                const deltaIm = (valIm * denomRe - valRe * denomIm) / dMag2;
                roots[i].re -= deltaRe;
                roots[i].im -= deltaIm;
                maxDelta = Math.max(maxDelta, Math.abs(deltaRe) + Math.abs(deltaIm));
            }
            if (maxDelta < 1e-12) break;
        }
        return roots;
    }

    // Math Core
    function dwh_result(ell) {
        if (ell >= 1) return 1;
        let l2 = ell * ell;
        let gamma_inner = Math.pow(4 * (1 - l2) / (l2 * l2), 1.0 / 3.0);
        let r = Math.sqrt(1 + gamma_inner);
        let innerSqrt = 8 - 4 * gamma_inner + 8 * (2 - l2) / (l2 * r);
        let a = r + 0.5 * Math.sqrt(Math.max(0, innerSqrt));
        let b = (a - 1) * (a - 1) / 4;
        let c = a + b - 1;
        let alpha = b / c;
        let beta = (a - alpha) / c;
        let gamma = 1 / c;
        return ell * (alpha + beta / (gamma + l2));
    }

    const pe_cache = new Map();
    function get_pe_result(ell, useWarmStart = false) {
        if (ell >= 0.999999) return 1.0;
        if (pe_cache.has(ell)) return pe_cache.get(ell);

        const L2 = ell * ell, L4 = L2 * L2, L6 = L4 * L2;
        const coeffs = [
            -2048,                      // q^9
            -5888,                      // q^8
            -9608 + 4520 * L2,          // q^7
            -7728 + 9340 * L2,          // q^6
            -1288 + 10990 * L2 - 3600 * L4, // q^5
            1748 + 8525 * L2 - 5800 * L4,   // q^4
            888 + 3200 * L2 - 3900 * L4 + 1000 * L6, // q^3
            8 + 80 * L2 - 1750 * L4 + 1500 * L6,      // q^2
            -72 - 240 * L2 - 600 * L4 + 750 * L6,     // q
            -12 - 40 * L2 - 100 * L4 + 125 * L6       // 1
        ];

        const r_list = solvePolynomial(coeffs, useWarmStart ? dk_warm_roots : null);
        if (useWarmStart) dk_warm_roots = r_list;

        const candidates = r_list
            .filter(r => Math.abs(r.im) < 1e-7)
            .map(r => r.re)
            .filter(q0 => q0 > ell && q0 < 0.999999)
            .sort((a, b) => b - a);

        for (const q0 of candidates) {
            const q0_2 = q0 * q0;
            const r2 = (2 * q0 * q0_2 + 4 * q0_2 + 6 * q0 + 3) / (5 * (2 * q0 + 1));
            const r = Math.sqrt(r2);
            if (r2 <= 0 || !(q0 < r && r < 1)) continue;

            const S = q0_2 + r2, P = q0_2 * r2;
            const D = (1 - 5 / 3 * S + 5 * P) + ell * (L4 - 5 / 3 * S * L2 + 5 * P);
            if (Math.abs(D) < 1e-12) continue;

            const c_pe = 2 / D, b_pe = -5 * c_pe / 3 * S, a_pe = 5 * c_pe * P;
            const u = a_pe + b_pe + c_pe;

            const p = (x) => {
                const x2 = x * x;
                return x * (a_pe + x2 * (b_pe + x2 * c_pe));
            };

            const err_ell = 1 - p(ell) / u;
            const err_q0 = p(q0) / u - 1;
            const err_r = 1 - p(r) / u;
            if (err_ell > -1e-9 && err_q0 > -1e-9 && err_r > -1e-9) {
                const res = p(ell) / u;
                pe_cache.set(ell, res);
                return res;
            }
        }

        const fallback = ell * (1.875 + L2 * (-1.25 + 0.375 * L2));
        pe_cache.set(ell, fallback);
        return fallback;
    }

    const ctx = document.getElementById('comparisonChart').getContext('2d');
    const cwLogX = document.getElementById('cwLogX');
    const cwLogY = document.getElementById('cwLogY');

    const colors = {
        dwh: '#e74c3c',
        pe1: '#3498db',
        pe2: '#2980b9',
        pe3: '#2471a3',
        pe4: '#1f618d',
        pe5: '#1a5276'
    };

    Chart.Tooltip.positioners.cursor = function(elements, eventPosition) {
        if (!eventPosition) return false;
        return { x: eventPosition.x, y: eventPosition.y };
    };

    let chart = new Chart(ctx, {
        type: 'line',
        data: { datasets: [] },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                tooltip: {
                    position: 'cursor',
                    callbacks: {
                        title: (items) => `Start ell: ${Number(items[0].parsed.x).toExponential(2)}`,
                        label: (item) => `${item.dataset.label}: ${Number(item.parsed.y).toFixed(5)}`
                    }
                },
                legend: { position: 'bottom' }
            },
            scales: {
                x: {
                    type: 'logarithmic',
                    title: { display: true, text: 'Starting Singular Value (ell)' }
                },
                y: {
                    type: 'linear',
                    title: { display: true, text: 'Resulting Singular Value' },
                    min: 0, max: 1.05
                }
            }
        }
    });

    function updateGraph() {
        const isLogY = cwLogY.checked;
        chart.options.scales.x.type = cwLogX.checked ? 'logarithmic' : 'linear';
        chart.options.scales.y.type = isLogY ? 'logarithmic' : 'linear';
        chart.options.scales.y.title.text = isLogY ? 'Residual Error (1 - y)' : 'Resulting Singular Value';
        chart.options.scales.y.min = isLogY ? 1e-16 : 0;
        chart.options.scales.y.max = isLogY ? 2 : 1.05;

        const ells = [];
        const start = -6, end = 0, pts = 1200; // Denser sweep enabled by optimization
        for(let i=0; i<=pts; i++) ells.push(Math.pow(10, start + i*(end-start)/pts));

        dk_warm_roots = null; // Clear warm start for new sweep
        const datasets = [
            { label: '1 DWH', color: colors.dwh, fn: (l) => dwh_result(l) },
            { label: '1 PE', color: colors.pe1, fn: (l, w) => get_pe_result(l, w) },
            { label: '2 PE', color: colors.pe2, fn: (l, w) => get_pe_result(get_pe_result(l, w), w) },
            { label: '3 PE', color: colors.pe3, fn: (l, w) => get_pe_result(get_pe_result(get_pe_result(l, w), w), w) },
            { label: '4 PE', color: colors.pe4, fn: (l, w) => get_pe_result(get_pe_result(get_pe_result(get_pe_result(l, w), w), w), w) },
            { label: '5 PE', color: colors.pe5, fn: (l, w) => {
                let r = l;
                for (let i = 0; i < 5; i++) r = get_pe_result(r, w);
                return r;
            }}
        ];

        chart.data.datasets = datasets.map(ds => {
            let max_y_so_far = -Infinity;
            // Warm start only works if we sweep monotonically
            dk_warm_roots = null; 
            return {
                label: ds.label,
                data: ells.map(l => {
                    let y = ds.fn(l, true); // useWarmStart = true
                    if (y < max_y_so_far) y = max_y_so_far; else max_y_so_far = y;
                    if (isLogY) {
                        y = Math.min(1.0, y);
                        y = 1 - y;
                        if (y < 1e-16) y = 1e-16;
                    }
                    return { x: l, y: y };
                }),
                borderColor: ds.color,
                backgroundColor: ds.color + '22',
                borderWidth: ds.label.includes('DWH') || ds.label.includes('5 PE') ? 3 : 1.5,
                pointRadius: 0,
                fill: false,
                tension: 0
            };
        });
        chart.update();
    }


    cwLogX.addEventListener('change', updateGraph);
    cwLogY.addEventListener('change', updateGraph);
    updateGraph();
});
</script>
